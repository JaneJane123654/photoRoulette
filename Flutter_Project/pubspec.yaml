name: photo_roulette_flutter
description: Flutter migration workspace for photoRoulette.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  dio: ^5.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  photo_manager: ^3.9.0
  permission_handler: ^12.0.1
