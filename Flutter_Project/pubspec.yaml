  collection: ^1.19.1
  path: ^1.9.1
  path_provider: ^2.1.5
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  golden_toolkit: ^0.15.0
  pigeon: ^26.3.4

flutter:
  generate: true
  uses-material-design: true
